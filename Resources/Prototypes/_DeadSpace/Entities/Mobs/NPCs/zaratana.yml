- type: damageModifierSet
  id: Zaratana
  coefficients:
    Blunt: 1.2
    Slash: 1
    Piercing: 0.4
    Shock: 0
    Cold: 0
    Heat: 0.2
    Radiation: 0
    Structural: 0.8

- type: damageContainer
  id: Zaratana
  supportedGroups:
  - Brute
  supportedTypes:
  - Heat
  - Shock
  - Structural

- type: soundCollection
  id: ZaratanaScream
  files:
  - /Audio/_DeadSpace/Mobs/Zaratana/zaratana_scream.ogg

- type: soundCollection
  id: ZaratanaXd
  files:
  - /Audio/_DeadSpace/Mobs/Zaratana/xd.ogg

- type: emoteSounds
  id: Zaratana
  params:
    variation: 0.125
    volume: 2
  sounds:
    Scream:
      collection: ZaratanaScream
    Laugh:
      collection: ZaratanaXd

- type: entity
  id: SpawnZaratana
  name: спавнер Заратаны
  components:
  - type: TimedDespawn
    lifetime: 0.01
  - type: SpawnOnDespawn
    prototype: SpawnZaratanaShadow
  - type: Sprite
    sprite: Markers/cross.rsi
    state: red
  - type: Marker

- type: entity 
  id: SpawnZaratanaShadow
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: _DeadSpace/Mobs/Aliens/Zaratana/shadow.rsi
    state: shadow
  - type: TimedDespawn
    lifetime: 3.5
  - type: EmitSoundOnTrigger
    sound:
      path: /Audio/_DeadSpace/Mobs/Zaratana/fall.ogg
      params:
        maxDistance: 25
    positional: true
  - type: TriggerOnSpawn
  - type: SpawnOnDespawn
    prototype: SpawnZaratanaEfectExplosion
  - type: Tag
    tags:
    - HideContextMenu

