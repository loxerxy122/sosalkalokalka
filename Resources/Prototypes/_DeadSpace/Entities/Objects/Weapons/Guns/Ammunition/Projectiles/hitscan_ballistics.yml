# DS14-start: hitscan replacements for common gun projectiles.
- type: entity
  id: BulletTrace
  abstract: true
  categories: [ HideSpawnMenu ]
  components:
  - type: HitscanAmmo
  - type: HitscanBasicRaycast
    collisionMask: BulletImpassable
    maxDistance: 40
  - type: HitscanReflect
    reflectiveType: NonEnergy
  - type: HitscanBasicVisuals
    muzzleFlash:
      sprite: _DeadSpace/Objects/Weapons/Guns/Projectiles/traces.rsi
      state: muzzle
    travelFlash:
      sprite: _DeadSpace/Objects/Weapons/Guns/Projectiles/traces.rsi
      state: trace
    impactFlash:
      sprite: _DeadSpace/Objects/Weapons/Guns/Projectiles/traces.rsi
      state: impact
    bullet:
      sprite:
        sprite: Objects/Weapons/Guns/Projectiles/projectiles2.rsi
        state: bullet
    speed: 315
  - type: HitscanBasicEffects
    sound:
      path: /Audio/Weapons/Guns/Hits/bullet_hit.ogg

- type: entity
  id: BulletUraniumTrace
  parent: BulletTrace
  categories: [ HideSpawnMenu ]
  components:
  - type: HitscanBasicVisuals
    bullet:
      sprite:
        sprite: Objects/Weapons/Guns/Projectiles/projectiles2.rsi
        state: uranium
    muzzleFlash:
      sprite: _DeadSpace/Objects/Weapons/Guns/Projectiles/traces.rsi
      state: muzzle_uran
    impactFlash:
      sprite: _DeadSpace/Objects/Weapons/Guns/Projectiles/traces.rsi
      state: impact_uran
    travelFlash:
      sprite: _DeadSpace/Objects/Weapons/Guns/Projectiles/traces.rsi
      state: trace_uran

