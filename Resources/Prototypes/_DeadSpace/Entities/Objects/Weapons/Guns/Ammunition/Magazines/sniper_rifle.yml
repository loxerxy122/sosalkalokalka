- type: entity
  id: MagazineR17
  name: магазин (.338 LM)
  description: ""
  parent: BaseItem
  components:
  - type: BallisticAmmoProvider
    proto: CartridgeSniperRifle
    capacity: 20
    whitelist:
      tags:
      - CartridgeSniperRifle
  - type: ContainerContainer
    containers:
      ballistic-ammo: !type:Container
  - type: Tag
    tags:
    - MagazineR17
  - type: Sprite
    sprite: _DeadSpace/Objects/Weapons/Guns/Ammunition/Magazine/sr.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]
  - type: MagazineVisuals
    magState: mag
    steps: 2
    zeroVisible: false
  - type: Appearance
  - type: EmitSoundOnPickup
    sound:
      path: /Audio/_DeadSpace/Items/Handing/gun/ballistics/magazine/magazine_pickup.ogg
  - type: EmitSoundOnDrop
    sound:
      path: /Audio/_DeadSpace/Items/Handing/gun/ballistics/magazine/magazine_drop.ogg
  - type: EmitSoundOnLand
    sound:
      path: /Audio/_DeadSpace/Items/Handing/gun/ballistics/magazine/magazine_drop.ogg

