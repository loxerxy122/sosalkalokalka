# DS14-start: hitscan replacements for energy projectile bolts.
- type: entity
  id: EnergyBoltTrace
  abstract: true
  categories: [ HideSpawnMenu ]
  components:
  - type: HitscanAmmo
  - type: HitscanBasicRaycast
    collisionMask: BulletImpassable
    maxDistance: 40
  - type: HitscanReflect
    reflectiveType: Energy
  - type: HitscanBasicVisuals
    speed: 260
    bullet:
      sprite:
        sprite: Objects/Weapons/Guns/Projectiles/projectiles_tg.rsi
        state: omnilaser
  - type: HitscanBasicEffects

- type: entity
  id: BulletDisablerTrace
  name: disabler bolt
  parent: EnergyBoltTrace
  categories: [ HideSpawnMenu ]
  components:
  - type: HitscanStaminaDamage
    staminaDamage: 33
  - type: HitscanBasicEffects
    sound:
      collection: WeakHit
    forceSound: true

- type: entity
